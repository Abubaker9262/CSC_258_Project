<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Trends Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Real-time trend system</p>
      <h1>Live Social Trends</h1>
    </div>
    <p id="status" class="status">Loading trend data...</p>
  </header>

  <main class="dashboard-shell">
    <section class="summary">
      <article class="metric-card">
        <h2>Posts Processed</h2>
        <p id="postsProcessed">0</p>
      </article>

      <article class="metric-card">
        <h2>Last Updated</h2>
        <p id="lastUpdated">Waiting</p>
      </article>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Top Topics</h2>
      </div>
      <div id="trendList" class="trend-list"></div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Example Posts</h2>
      </div>
      <div id="exampleList" class="example-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
