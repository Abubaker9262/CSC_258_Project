services:
  broker:
    image: apache/kafka:4.1.2
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_LISTENERS: CONTROLLER://localhost:9091,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://broker:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,DOCKER:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  ingestion:
    image: python:3.11-slim
    container_name: ingestion
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python -m services.ingestion.main"
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: broker:9093
    volumes:
      - .:/app
    depends_on:
      - broker
    restart: unless-stopped

  processing:
    image: python:3.11-slim
    container_name: processing
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python -m services.processing.main"
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: broker:9093
      STORAGE_API_URL: http://storage:5001
    volumes:
      - .:/app
    depends_on:
      - broker
      - storage
    restart: unless-stopped


  db:
    image: postgres:16
    container_name: trends-db
    environment:
      POSTGRES_DB: trends_db
      POSTGRES_USER: trend_user
      POSTGRES_PASSWORD: trend_password
    ports:
      - "5432:5432"
    volumes:
      - trends-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  storage:
    image: python:3.11-slim
    container_name: storage
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python -m services.storage.main"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://trend_user:trend_password@db:5432/trends_db
    ports:
      - "5001:5001"
    volumes:
      - .:/app
    depends_on:
      - db
    restart: unless-stopped

  dashboard:
    image: python:3.11-slim
    container_name: dashboard
    working_dir: /app
    command: python -m http.server 8000 --directory /app/services
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - storage
    restart: unless-stopped
    
volumes:
  trends-db-data:
